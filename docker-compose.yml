services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto_exchange_db
    restart: always
    environment:
      POSTGRES_USER: ali
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: crypto_exchange
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
